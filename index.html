<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <title>鸭吉吉答案之书 · YajijiOracle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ========== 加载弹窗 ========== */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-dialog {
      background: rgba(10,10,10,0.94);
      border: 1px solid rgba(200,180,100,0.2);
      border-radius: 2rem;
      padding: 2rem 2.2rem;
      max-width: 280px;
      width: 80%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.9);
    }
    .loading-duck { font-size: 2.2rem; margin-bottom: 0.6rem; }
    .loading-title {
      font-family: "Noto Serif SC","Times New Roman","宋体",serif;
      font-size: 1.2rem;
      background: linear-gradient(180deg,#ebd79c 0%,#9b8a5a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.6rem;
      letter-spacing: 0.15em;
    }
    .progress-track {
      width: 100%; height: 3px;
      background: rgba(255,255,200,0.08);
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg,#9b8a5a,#ebd79c);
      border-radius: 3px;
      transition: width 0.25s ease;
    }
    .progress-text {
      color: #7a6e4a; font-size: 0.75rem;
      margin-top: 0.6rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.15em;
    }

    body {
      background: #000;
      width: 100%; min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Noto Serif SC","Times New Roman","宋体","仿宋","Georgia","楷体",serif;
      padding: 1.5rem; margin: 0;
    }

    .book-container {
      max-width: 700px; width: 100%;
      background: rgba(10,10,10,0.75);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,200,0.08);
      border-radius: 3.5rem 3.5rem 2.8rem 2.8rem;
      box-shadow: 0 30px 50px rgba(0,0,0,0.9), 0 0 0 1px rgba(220,200,120,0.15) inset;
      padding: 2.8rem 2.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ========== 中央动画区域 ========== */
    .video-container {
      width: 100%; max-width: 480px;
      margin: 0 auto 2.5rem auto;
      aspect-ratio: 16 / 9;
      border-radius: 2.2rem;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 0 2px rgba(180,150,70,0.2);
      border: 1px solid rgba(200,180,100,0.25);
      background: radial-gradient(ellipse at center, rgba(30,22,5,0.95) 0%, #000 100%);
      position: relative;
    }
    /* 加载中占位 */
    .video-container::before {
      content: '🦆';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-size: 2.4rem;
      opacity: 0.12;
      z-index: 0;
      animation: placeholder-pulse 2.4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes placeholder-pulse {
      0%,100% { opacity: 0.08; transform: translate(-50%,-50%) scale(1); }
      50%     { opacity: 0.20; transform: translate(-50%,-50%) scale(1.08); }
    }
    .video-container video,
    .video-container img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
    }
    /* 背景GIF：顶层常亮循环 */
    .bg-gif { z-index: 2; display: block; }
    /* 动作GIF：底层常驻，点击由JS控制z-index浮到顶层 */
    .gif-overlay { z-index: 1; display: block; }

    .prompt-text {
      color: #d4c094;
      font-size: 1.2rem;
      letter-spacing: 0.25em;
      text-shadow: 0 0 15px #1a1608;
      margin-bottom: 2rem;
      font-weight: 350;
      text-align: center;
      line-height: 1.7;
      background: linear-gradient(180deg,#ebd79c 0%,#9b8a5a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      border-bottom: 1px dashed rgba(190,160,70,0.3);
      padding-bottom: 0.8rem;
      width: fit-content;
      margin-left: auto; margin-right: auto;
    }

    .answer-display {
      width: 100%; min-height: 130px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(200,170,70,0.35);
      border-radius: 2.5rem;
      margin: 0.6rem 0 2.2rem 0;
      padding: 1.8rem;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      color: #f7efcc;
      font-size: 1.8rem;
      font-weight: 420;
      letter-spacing: 0.12em;
      line-height: 1.5;
      text-shadow: 0 0 20px #9b8a4a;
      box-shadow: inset 0 0 35px rgba(20,15,0,0.9), 0 8px 20px rgba(0,0,0,0.8);
      transition: all 0.4s cubic-bezier(0.2,0.9,0.4,1);
      word-break: break-word;
      background-image: radial-gradient(circle at 20% 30%, rgba(70,60,20,0.3) 0%, transparent 50%);
      position: relative;
      overflow: hidden;
    }
    .answer-placeholder {
      color: #5a5440;
      font-size: 1.3rem;
      letter-spacing: 0.2em;
      opacity: 0.7;
      font-style: italic;
    }

    .get-answer-btn {
      background: rgba(18,16,5,0.7);
      border: 1.5px solid #c4a64b;
      color: #ecd994;
      font-size: 1.3rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      padding: 0.9rem 2.8rem;
      border-radius: 3rem;
      cursor: pointer;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.7), 0 0 18px rgba(190,150,30,0.3);
      transition: all 0.3s ease;
      text-transform: uppercase;
      margin-top: 0.4rem;
      display: flex; align-items: center; gap: 0.5rem; justify-content: center;
    }
    .get-answer-btn:hover {
      background: rgba(30,25,8,0.8);
      border-color: #e7c45e;
      color: #fcedb3;
      box-shadow: 0 0 35px rgba(210,160,20,0.6), 0 8px 22px black;
      transform: scale(1.02);
      letter-spacing: 0.35em;
    }
    .get-answer-btn:active {
      transform: scale(0.97);
      box-shadow: 0 0 45px #b4942e;
      background: #1f1a08;
    }

    .duck-icon { font-size: 1.6rem; filter: drop-shadow(0 0 8px gold); }

    .version-tag {
      position: fixed;
      top: 12px; left: 16px;
      color: rgba(220,200,120,0.35);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      font-family: "Courier New",monospace;
      z-index: 1;
      user-select: none;
    }

    .footnote {
      margin-top: 1.8rem;
      color: #4a432a;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      opacity: 0.6;
    }

    /* ===== 答案出场（简洁渐入） ===== */
    @keyframes answer-fade-in {
      0%   { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .answer-fade-in {
      animation: answer-fade-in 0.4s ease-out forwards;
    }

    @media (max-width: 500px) {
      .book-container { padding: 1.5rem 0.8rem; border-radius: 2rem; }
      .video-container { max-width: 100%; margin-bottom: 1.5rem; border-radius: 1.5rem; }
      .answer-display { font-size: 1.2rem; min-height: 100px; padding: 1.2rem; }
      .get-answer-btn { font-size: 1.1rem; padding: 0.7rem 1.8rem; }
      .prompt-text { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="version-tag">v 1.0.5</div>

  <!-- 加载弹窗（极简等待） -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-dialog">
      <div class="loading-duck">🦆</div>
      <div class="loading-title">加载中...</div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
    </div>
  </div>

  <div class="book-container">
    <!-- 中央动画区 -->
    <div class="video-container">
      <img src="mp4/ya.gif" class="bg-gif" id="bgGif" alt="">
      <img src="mp4/tiao.gif" class="gif-overlay" id="tiaoGif" alt="">
    </div>

    <div class="prompt-text">
      <span class="duck-icon">🦆</span> 内心想一个问题 <br>
      <span style="font-size:0.9rem; display:block; margin-top:0.2rem;">鸭吉吉会给你回复</span>
    </div>

    <div class="answer-display" id="answerDisplay">
      <span class="answer-placeholder" id="answerText">静默思考中...</span>
    </div>

    <button class="get-answer-btn" id="getAnswerBtn">
      <span>📖</span> 获取回答 <span>📖</span>
    </button>

    <div class="footnote">◈ YajijiOracle · 鸭吉吉答案之书 ◈</div>
  </div>

  <script>
    (function() {
      const loadingOverlay = document.getElementById('loadingOverlay');
      const progressFill = document.getElementById('progressFill');
      const progressText = document.getElementById('progressText');
      const tiaoGif = document.getElementById('tiaoGif');
      const bgGif = document.getElementById('bgGif');
      const getAnswerBtn = document.getElementById('getAnswerBtn');

      // ========== 预加载：视频 + GIF 同时加载 ==========
      var loaded = false;
      var pageShown = false;

      function showPage() {
        if (pageShown) return;
        pageShown = true;
        loadingOverlay.classList.add('hidden');
        getAnswerBtn.addEventListener('click', handleGetAnswer);
        window.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleGetAnswer(); }
        });
        console.log('🦆 YajijiOracle v1.0.1 已开启。');
      }

      function updateProgress(pct) {
        progressFill.style.width = pct + '%';
        progressText.textContent = pct + '%';
      }

      // 保底：3 秒自动显示
      var safetyTimer = setTimeout(function() {
        updateProgress(100);
        if (!pageShown) showPage();
      }, 3000);

      // 预加载 tiaoGif（动作GIF）
      var preloadImg = new Image();
      function onPreloadDone() {
        updateProgress(100);
        if (!loaded) { loaded = true; clearTimeout(safetyTimer); showPage(); }
      }
      preloadImg.onload = onPreloadDone;
      preloadImg.onerror = onPreloadDone;
      preloadImg.src = tiaoGif.src;
      tiaoGif.src = tiaoGif.src;

      // 触发背景GIF加载
      bgGif.src = bgGif.src;

      // ========== 答案系统 ==========
      const answers = [
        "是的，毫无疑问。", "鸭吉吉说：时机未到。", "相信你的直觉。",
        "不要犹豫，去吧。", "答案就在你心中。", "再等一等，涟漪会平静。",
        "它已经在路上了。", "保持好奇心。", "换个角度看看。",
        "鸭吉吉点头：当然。", "别想太多，顺其自然。", "也许你应该放手。",
        "这将是一个惊喜。", "值得冒险一试。", "倾听内心的声音。",
        "很快就会有答案。", "鸭吉吉摇头：未必。", "你需要更多耐心。",
        "结果是积极的。", "暂时保持沉默。", "对，但方式可能不同。",
        "命运站在你这边。", "不要强求。", "享受过程吧。",
        "它会以奇妙的方式出现。", "鸭吉吉认为：可行。", "小心过于乐观。",
        "先完成手头的事。", "宇宙在为你布局。", "平凡中藏有答案。",
        "勇敢一点。", "等待更好的时机。", "答案是模糊的，再问一次。",
        "鸭吉吉微笑：如你所愿。", "改变正在发生。", "专注当下。",
        "别被表象迷惑。", "你早已知道答案。", "水到渠成。", "或许需要他人帮助。"
      ];

      const answerDisplay = document.getElementById('answerDisplay');
      const answerTextElement = document.getElementById('answerText');

      var chimeAudio = new Audio('audio/click.mp3');
      chimeAudio.preload = 'auto';

      var isAnimating = false;
      var animationTimer = null;

      function getRandomAnswer() {
        return answers[Math.floor(Math.random() * answers.length)];
      }

      function playChime() {
        try { chimeAudio.currentTime = 0; chimeAudio.play().catch(function(){}); } catch(e) {}
      }

      function createConfetti() {
        var rect = answerDisplay.getBoundingClientRect();
        var cx = rect.left + rect.width/2;
        var cy = rect.top + rect.height/2;
        var colors = ['#ff0040','#ff8c00','#ffe600','#66ff00','#00ffcc','#0066ff','#6600ff','#ff00cc','#ff88aa','#ffcc00','#00ff00','#ff00ff','#ffffff'];

        for (var i = 0; i < 80; i++) {
          var el = document.createElement('div');
          var isStreamer = i > 60 && Math.random() > 0.4;
          var size = 3 + Math.random() * 6;
          var color = colors[Math.floor(Math.random() * colors.length)];
          el.style.cssText = [
            'position:fixed',
            'width:' + (isStreamer ? size*0.3 : size) + 'px',
            'height:' + (isStreamer ? size*4 : size) + 'px',
            'background:' + color,
            'border-radius:' + (Math.random() > 0.6 ? '50%' : '1px'),
            'pointer-events:none',
            'z-index:1000',
            'left:' + cx + 'px',
            'top:' + cy + 'px',
            'box-shadow:0 0 ' + (2+Math.random()*6) + 'px ' + color,
            'opacity:' + (0.7+Math.random()*0.3)
          ].join(';');
          document.body.appendChild(el);

          var angle = -Math.PI/2 + (Math.random()-0.5)*Math.PI*1.2;
          var dist = 40 + Math.random()*260;
          var dx = Math.cos(angle)*dist;
          var dy = Math.sin(angle)*dist - 80;

          el.animate([
            { transform: 'translate(0,0) scale(1) rotate(0deg)', opacity: '1' },
            { transform: 'translate('+dx+'px,'+dy+'px) scale(0.1) rotate('+(Math.random()*1080-540)+'deg)', opacity: '0' }
          ], {
            duration: 1800 + Math.random()*1400,
            easing: 'cubic-bezier(0.08,0.9,0.3,1)',
            fill: 'forwards',
            delay: Math.random()*300
          }).onfinish = function() { el.remove(); };
        }
      }

      function setAnswerWithEffect(answer) {
        if (animationTimer) clearTimeout(animationTimer);
        answerTextElement.classList.remove('answer-placeholder');
        answerTextElement.textContent = answer;
        animationTimer = setTimeout(function() { animationTimer = null; }, 60);
      }

      function handleGetAnswer() {
        if (isAnimating) return;
        if (animationTimer) { clearTimeout(animationTimer); animationTimer = null; }
        isAnimating = true;
        var newAnswer = getRandomAnswer();

        answerTextElement.classList.remove('answer-placeholder','answer-fade-in');

        setAnswerWithEffect(newAnswer);

        answerTextElement.classList.add('answer-fade-in');

        playChime();
        createConfetti();

        // tiao GIF 浮到顶层，背景GIF沉到底层
        tiaoGif.style.zIndex = '10';
        bgGif.style.zIndex = '1';
        tiaoGif.src = tiaoGif.src.split('?')[0] + '?t=' + Date.now();
        // 播完背景GIF切回顶层
        setTimeout(function() {
          tiaoGif.style.zIndex = '1';
          bgGif.style.zIndex = '2';
        }, 2500);

        setTimeout(function() { isAnimating = false; }, 600);
        getAnswerBtn.style.transform = 'scale(0.96)';
        setTimeout(function() { getAnswerBtn.style.transform = ''; }, 120);
      }
    })();
  </script>
</body>
</html>
