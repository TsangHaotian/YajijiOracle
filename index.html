<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <title>鸭吉吉答案之书 · YajijiOracle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ========== 加载弹窗 ========== */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-dialog {
      background: rgba(10, 10, 10, 0.94);
      border: 1px solid rgba(200, 180, 100, 0.2);
      border-radius: 2rem;
      padding: 2rem 2.2rem;
      max-width: 280px;
      width: 80%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.9);
    }
    .loading-duck {
      font-size: 2.2rem;
      margin-bottom: 0.6rem;
    }
    .loading-title {
      font-family: "Noto Serif SC", "Times New Roman", "宋体", serif;
      font-size: 1.2rem;
      background: linear-gradient(180deg, #ebd79c 0%, #9b8a5a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.6rem;
      letter-spacing: 0.15em;
    }
    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 200, 0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #9b8a5a, #ebd79c);
      border-radius: 3px;
      transition: width 0.25s ease;
    }
    .progress-text {
      color: #7a6e4a;
      font-size: 0.75rem;
      margin-top: 0.6rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.15em;
    }

    body {
      background-color: #000000;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Noto Serif SC", "Times New Roman", "宋体", "仿宋", "Georgia", "楷体", serif;
      padding: 1.5rem;
      margin: 0;
      background: radial-gradient(circle at center, #0a0a0a 0%, #000000 90%);
    }

    .book-container {
      max-width: 700px;
      width: 100%;
      background: rgba(10, 10, 10, 0.75);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 200, 0.08);
      border-radius: 3.5rem 3.5rem 2.8rem 2.8rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(220, 200, 120, 0.15) inset;
      padding: 2.8rem 2.2rem 2.8rem 2.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .video-container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto 2.5rem auto;
      aspect-ratio: 16 / 9;
      border-radius: 2.2rem;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(180, 150, 70, 0.2);
      border: 1px solid rgba(200, 180, 100, 0.25);
      background: radial-gradient(ellipse at center, rgba(30, 22, 5, 0.95) 0%, #000 100%);
      position: relative;
    }
    /* 视频加载中占位：金色微光脉动 */
    .video-container::before {
      content: '🦆';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.4rem;
      opacity: 0.15;
      z-index: 0;
      animation: placeholder-pulse 2.4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes placeholder-pulse {
      0%, 100% { opacity: 0.10; transform: translate(-50%, -50%) scale(1); }
      50%      { opacity: 0.25; transform: translate(-50%, -50%) scale(1.08); }
    }
    /* 视频/GIF加载完成后盖住占位符 */
    .video-container video, .video-container img {
      position: absolute;
      z-index: 1;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .gif-overlay {
      display: none;
    }

    .prompt-text {
      color: #d4c094;
      font-size: 1.2rem;
      letter-spacing: 0.25em;
      text-shadow: 0 0 15px #1a1608;
      margin-bottom: 2rem;
      font-weight: 350;
      text-align: center;
      line-height: 1.7;
      background: linear-gradient(180deg, #ebd79c 0%, #9b8a5a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      border-bottom: 1px dashed rgba(190, 160, 70, 0.3);
      padding-bottom: 0.8rem;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }

    .duck-name {
      font-weight: 600;
      background: linear-gradient(135deg, #f3e1a4, #c9a84b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 1.3rem;
    }

    .answer-display {
      width: 100%;
      min-height: 130px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(200, 170, 70, 0.35);
      border-radius: 2.5rem;
      margin: 0.6rem 0 2.2rem 0;
      padding: 1.8rem 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #f7efcc;
      font-size: 1.8rem;
      font-weight: 420;
      letter-spacing: 0.12em;
      line-height: 1.5;
      text-shadow: 0 0 20px #9b8a4a;
      box-shadow: inset 0 0 35px rgba(20, 15, 0, 0.9), 0 8px 20px rgba(0,0,0,0.8);
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
      word-break: break-word;
      background-image: radial-gradient(circle at 20% 30%, rgba(70, 60, 20, 0.3) 0%, transparent 50%);
    }

    .answer-placeholder {
      color: #5a5440;
      font-size: 1.3rem;
      letter-spacing: 0.2em;
      opacity: 0.7;
      font-style: italic;
    }

    .get-answer-btn {
      background: #0f0e08;
      border: 1.5px solid #c4a64b;
      color: #ecd994;
      font-size: 1.3rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      padding: 0.9rem 2.8rem;
      border-radius: 3rem;
      cursor: pointer;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(18, 16, 5, 0.7);
      box-shadow: 0 5px 20px rgba(0,0,0,0.7), 0 0 18px rgba(190, 150, 30, 0.3);
      transition: all 0.3s ease;
      text-transform: uppercase;
      margin-top: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
    }

    .get-answer-btn:hover {
      background: rgba(30, 25, 8, 0.8);
      border-color: #e7c45e;
      color: #fcedb3;
      box-shadow: 0 0 35px rgba(210, 160, 20, 0.6), 0 8px 22px black;
      transform: scale(1.02);
      letter-spacing: 0.35em;
    }

    .get-answer-btn:active {
      transform: scale(0.97);
      box-shadow: 0 0 45px #b4942e;
      background: #1f1a08;
    }

    .duck-icon {
      font-size: 1.6rem;
      filter: drop-shadow(0 0 8px gold);
    }

    .version-tag {
      position: fixed;
      top: 12px;
      left: 16px;
      color: rgba(220, 200, 120, 0.35);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      font-family: "Courier New", monospace;
      z-index: 1;
      user-select: none;
    }

    .footnote {
      margin-top: 1.8rem;
      color: #4a432a;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      opacity: 0.6;
    }

    /* ===== 精神污染 · 答案出场 ===== */
    @keyframes answer-appear {
      0%   { opacity: 0; filter: blur(24px) hue-rotate(0deg); transform: scale(0.15) rotate(-20deg) translateY(60px); }
      6%   { opacity: 1; filter: blur(0) hue-rotate(1080deg); transform: scale(1.15) rotate(4deg) translateY(-10px); text-shadow: -5px 0 10px cyan, 5px 0 10px red, 0 0 30px yellow; }
      12%  { opacity: 1; filter: blur(0) hue-rotate(0deg); transform: scale(0.92) rotate(-3deg) translateY(5px); text-shadow: -4px 0 8px #00ffff, 4px 0 8px #ff0040, 0 0 25px #ffff00aa; }
      20%  { transform: scale(1.05) rotate(2deg); text-shadow: -3px 0 7px #00ff88, 3px 0 7px #ff6600, 0 0 20px #ff0040aa; }
      30%  { opacity: 1; filter: blur(0); transform: scale(1) rotate(0deg) translateY(0); text-shadow: 0 0 8px #ffe600, 0 0 25px #ffe60066, -2px 0 6px #ff8800aa; }
      44%  { text-shadow: 0 0 8px #66ff00, 0 0 25px #66ff0066, 0 0 50px #66ff0033, -3px 0 6px cyan, 3px 0 6px red; }
      58%  { text-shadow: 0 0 8px #00ffcc, 0 0 25px #00ffcc66, 0 0 50px #00ffcc33, -4px 0 8px #ff00ff66; }
      72%  { text-shadow: 0 0 8px #6600ff, 0 0 25px #6600ff66, 0 0 50px #6600ff33, 4px 0 8px #00ffff66; }
      88%  { text-shadow: 0 0 8px #ff00cc, 0 0 25px #ff00cc66, 0 0 50px #ff00cc33, -2px 0 6px #66ff00aa, 2px 0 6px #ff0066aa; }
      100% { opacity: 1; filter: blur(0); transform: scale(1) rotate(0deg) translateY(0); text-shadow: 0 0 8px #ff6699, 0 0 25px #ff669966, 0 0 50px #ff669933; }
    }
    .answer-colorful {
      animation: answer-appear 5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* 卡片蹦迪 — 抖动 + 背景闪烁 */
    @keyframes answer-shake {
      0%, 100% { transform: translate(0, 0); }
      2% { transform: translate(-6px, 4px); }
      4% { transform: translate(6px, -3px); }
      6% { transform: translate(-4px, -5px); }
      8% { transform: translate(4px, 3px); }
      10% { transform: translate(-3px, 5px); }
      12% { transform: translate(3px, -4px); }
      14% { transform: translate(-2px, 2px); }
      16% { transform: translate(0); }
    }
    @keyframes bg-flash {
      0%   { background: rgba(0,0,0,0.65); }
      8%   { background: rgba(50,0,10,0.75); }
      16%  { background: rgba(10,40,0,0.75); }
      24%  { background: rgba(0,10,50,0.75); }
      32%  { background: rgba(40,0,40,0.75); }
      42%  { background: rgba(0,0,0,0.65); }
      100% { background: rgba(0,0,0,0.65); }
    }
    .answer-shake {
      animation: answer-shake 1.5s ease-out forwards, bg-flash 4s ease-out forwards;
    }

    /* 流光扫过 */
    @keyframes shimmer-sweep {
      0%   { transform: translateX(-100%) skewX(-15deg); }
      55%  { transform: translateX(200%) skewX(-15deg); }
      100% { transform: translateX(200%) skewX(-15deg); }
    }
    .answer-shimmer::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 200, 0.1), transparent);
      transform: translateX(-100%) skewX(-15deg);
      animation: shimmer-sweep 3s ease-out 0.3s forwards;
      pointer-events: none;
    }
    .answer-display {
      position: relative;
      overflow: hidden;
    }

    @media (max-width: 500px) {
      .book-container {
        padding: 1.5rem 0.8rem;
        border-radius: 2rem;
      }
      .video-container {
        max-width: 100%;
        margin-bottom: 1.5rem;
        border-radius: 1.5rem;
      }
      .answer-display {
        font-size: 1.2rem;
        min-height: 100px;
        padding: 1.2rem;
      }
      .get-answer-btn {
        font-size: 1.1rem;
        padding: 0.7rem 1.8rem;
      }
      .prompt-text {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- 版本号 -->
  <div class="version-tag">v 0.2.1</div>

  <!-- 加载弹窗 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-dialog">
      <div class="loading-duck">🦆</div>
      <div class="loading-title">加载中...</div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
    </div>
  </div>
  <div class="book-container">
    
    <!-- 中央MP4视频区域 -->
    <div class="video-container">
      <video autoplay loop muted playsinline id="bgVideo" preload="metadata" src="mp4/ya.mp4"
             webkit-playsinline x5-playsinline x5-video-player-type="h5" x5-video-player-fullscreen="false"></video>
      <img src="mp4/tiao.gif" class="gif-overlay" id="tiaoGif" alt="">
    </div>

    <!-- 提示词：内心想一个问题，鸭吉吉会给你回复 -->
    <div class="prompt-text">
      <span class="duck-icon">🦆</span> 内心想一个问题 <br>
      <span style="font-size:0.9rem; display:block; margin-top:0.2rem;">鸭吉吉会给你回复</span>
    </div>

    <!-- 答案显示区 -->
    <div class="answer-display" id="answerDisplay">
      <span class="answer-placeholder" id="answerText">静默思考中...</span>
    </div>

    <!-- 获取回答按钮 -->
    <button class="get-answer-btn" id="getAnswerBtn">
      <span>📖</span> 获取回答 <span>📖</span>
    </button>

    <!-- 脚注更新为YajijiOracle -->
    <div class="footnote">
      ◈ YajijiOracle · 鸭吉吉答案之书 ◈
    </div>
  </div>

  <script>
    (function() {
      // ========== 预加载（视频 + GIF） ==========
      const loadingOverlay = document.getElementById('loadingOverlay');
      const progressFill = document.getElementById('progressFill');
      const progressText = document.getElementById('progressText');
      const bgVideo = document.getElementById('bgVideo');
      const tiaoGif = document.getElementById('tiaoGif');

      function loadAll() {
        var total = 2; // 1 video + 1 gif
        var loaded = 0;
        var shown = false;
        var safetyTimer = setTimeout(function() { if (!shown) { shown = true; showPage(); } }, 15000);

        function onOneLoaded() {
          loaded++;
          var pct = Math.min(100, Math.round((loaded / total) * 100));
          progressFill.style.width = pct + '%';
          progressText.textContent = pct + '%';
          if (!shown && loaded >= total) {
            shown = true;
            clearTimeout(safetyTimer);
            showPage();
          }
        }

        // 背景视频：canplay 表示可以流畅播放
        bgVideo.addEventListener('canplay', onOneLoaded, { once: true });
        bgVideo.addEventListener('error', onOneLoaded, { once: true });

        // 自动播放（muted 大多数浏览器允许）
        bgVideo.play().catch(function() {});
        // 如果视频本身已缓存就绪（readyState），手动触发
        if (bgVideo.readyState >= 3) onOneLoaded();

        // 动作 GIF：Image 预加载
        var img = new Image();
        img.onload = onOneLoaded;
        img.onerror = onOneLoaded;
        img.src = tiaoGif.src;
        tiaoGif.src = tiaoGif.src;
      }

      var pageShown = false;
      function showPage() {
        if (pageShown) return;
        pageShown = true;
        loadingOverlay.classList.add('hidden');
        getAnswerBtn.addEventListener('click', handleGetAnswer);
        window.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleGetAnswer(); }
        });
        getAnswerBtn.addEventListener('touchstart', function() {}, { passive: true });
        console.log('🦆 YajijiOracle · 鸭吉吉答案之书已开启。');
      }

      // ========== 答案系统 ==========
      const answers = [
        "是的，毫无疑问。", "鸭吉吉说：时机未到。", "相信你的直觉。",
        "不要犹豫，去吧。", "答案就在你心中。", "再等一等，涟漪会平静。",
        "它已经在路上了。", "保持好奇心。", "换个角度看看。",
        "鸭吉吉点头：当然。", "别想太多，顺其自然。", "也许你应该放手。",
        "这将是一个惊喜。", "值得冒险一试。", "倾听内心的声音。",
        "很快就会有答案。", "鸭吉吉摇头：未必。", "你需要更多耐心。",
        "结果是积极的。", "暂时保持沉默。", "对，但方式可能不同。",
        "命运站在你这边。", "不要强求。", "享受过程吧。",
        "它会以奇妙的方式出现。", "鸭吉吉认为：可行。", "小心过于乐观。",
        "先完成手头的事。", "宇宙在为你布局。", "平凡中藏有答案。",
        "勇敢一点。", "等待更好的时机。", "答案是模糊的，再问一次。",
        "鸭吉吉微笑：如你所愿。", "改变正在发生。", "专注当下。",
        "别被表象迷惑。", "你早已知道答案。", "水到渠成。", "或许需要他人帮助。"
      ];

      const answerDisplay = document.getElementById('answerDisplay');
      const answerTextElement = document.getElementById('answerText');
      const getAnswerBtn = document.getElementById('getAnswerBtn');

      // 预创建音效（对微信等兼容）
      var chimeAudio = new Audio('audio/click.mp3');
      chimeAudio.preload = 'auto';

      let isAnimating = false;
      let animationTimer = null;

      function getRandomAnswer() {
        return answers[Math.floor(Math.random() * answers.length)];
      }

      function playChime() {
        try {
          chimeAudio.currentTime = 0;
          chimeAudio.play().catch(function() {});
        } catch(e) {}
      }

      function createConfetti() {
        var rect = answerDisplay.getBoundingClientRect();
        var cx = rect.left + rect.width / 2;
        var cy = rect.top + rect.height / 2;
        var colors = ['#ff0040','#ff8c00','#ffe600','#66ff00','#00ffcc','#0066ff','#6600ff','#ff00cc','#ff88aa','#ffcc00','#00ff00','#ff00ff','#ffffff'];

        for (var i = 0; i < 80; i++) {
          var el = document.createElement('div');
          var isStreamer = i > 60 && Math.random() > 0.4;
          var size = 3 + Math.random() * 6;
          var color = colors[Math.floor(Math.random() * colors.length)];
          el.style.cssText = [
            'position:fixed',
            'width:' + (isStreamer ? size * 0.3 : size) + 'px',
            'height:' + (isStreamer ? size * 4 : size) + 'px',
            'background:' + color,
            'border-radius:' + (Math.random() > 0.6 ? '50%' : '1px'),
            'pointer-events:none',
            'z-index:1000',
            'left:' + cx + 'px',
            'top:' + cy + 'px',
            'box-shadow:0 0 ' + (2 + Math.random() * 6) + 'px ' + color,
            'opacity:' + (0.7 + Math.random() * 0.3)
          ].join(';');
          document.body.appendChild(el);

          var angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.2;
          var dist = 40 + Math.random() * 260;
          var dx = Math.cos(angle) * dist;
          var dy = Math.sin(angle) * dist - 80;

          el.animate([
            { transform: 'translate(0,0) scale(1) rotate(0deg)', opacity: '1' },
            { transform: 'translate(' + dx + 'px,' + dy + 'px) scale(0.1) rotate(' + (Math.random() * 1080 - 540) + 'deg)', opacity: '0' }
          ], {
            duration: 1800 + Math.random() * 1400,
            easing: 'cubic-bezier(0.08,0.9,0.3,1)',
            fill: 'forwards',
            delay: Math.random() * 300
          }).onfinish = function() { el.remove(); };
        }
      }

      function setAnswerWithEffect(answer) {
        if (animationTimer) clearTimeout(animationTimer);
        answerTextElement.classList.remove('answer-placeholder');
        answerTextElement.textContent = answer;
        // CSS 动画接管出场，这里不做操作透明过渡
        animationTimer = setTimeout(function() {
          animationTimer = null;
        }, 60);
      }

      function handleGetAnswer() {
        if (isAnimating) return;
        if (animationTimer) { clearTimeout(animationTimer); animationTimer = null; }
        isAnimating = true;
        var newAnswer = getRandomAnswer();

        // 清除旧动画状态
        answerTextElement.classList.remove('answer-placeholder', 'answer-colorful');
        answerDisplay.classList.remove('answer-shimmer', 'answer-shake');
        answerTextElement.style.opacity = '0';
        answerTextElement.style.filter = 'blur(24px) hue-rotate(0deg)';
        answerTextElement.style.transform = 'scale(0.15) rotate(-20deg) translateY(60px)';

        setAnswerWithEffect(newAnswer);

        // 触发 CSS 出场动画
        void answerTextElement.offsetWidth;
        answerTextElement.classList.add('answer-colorful');
        answerDisplay.classList.add('answer-shimmer', 'answer-shake');

        playChime();
        createConfetti();

        // 触发 tiao GIF
        tiaoGif.src = tiaoGif.src.split('?')[0] + '?t=' + Date.now();
        tiaoGif.style.display = 'block';

        setTimeout(function() {
          tiaoGif.style.display = 'none';
        }, 2500);

        setTimeout(function() { isAnimating = false; }, 600);
        getAnswerBtn.style.transform = 'scale(0.96)';
        setTimeout(function() { getAnswerBtn.style.transform = ''; }, 120);
      }

      // ========== 启动 ==========
      loadAll();
    })();
  </script>
</body>
</html>
