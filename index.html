<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <title>鸭吉吉答案之书 · YajijiOracle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ========== 加载弹窗 ========== */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-dialog {
      background: rgba(10,10,10,0.94);
      border: 1px solid rgba(200,180,100,0.2);
      border-radius: 2rem;
      padding: 2rem 2.2rem;
      max-width: 280px;
      width: 80%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.9);
    }
    .loading-duck { font-size: 2.2rem; margin-bottom: 0.6rem; }
    .loading-title {
      font-family: "Noto Serif SC","Times New Roman","宋体",serif;
      font-size: 1.2rem;
      background: linear-gradient(180deg,#ebd79c 0%,#9b8a5a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.6rem;
      letter-spacing: 0.15em;
    }
    .progress-track {
      width: 100%; height: 3px;
      background: rgba(255,255,200,0.08);
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg,#9b8a5a,#ebd79c);
      border-radius: 3px;
      transition: width 0.25s ease;
    }
    .progress-text {
      color: #7a6e4a; font-size: 0.75rem;
      margin-top: 0.6rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.15em;
    }

    body {
      background: #000;
      width: 100%; min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Noto Serif SC","Times New Roman","宋体","仿宋","Georgia","楷体",serif;
      padding: 1.5rem; margin: 0;
    }

    .book-container {
      max-width: 700px; width: 100%;
      background: rgba(10,10,10,0.75);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,200,0.08);
      border-radius: 3.5rem 3.5rem 2.8rem 2.8rem;
      box-shadow: 0 30px 50px rgba(0,0,0,0.9), 0 0 0 1px rgba(220,200,120,0.15) inset;
      padding: 2.8rem 2.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ========== 宠物展示区（纯黑底） ========== */
    .pet-scene {
      width: 100%;
      margin: 0 auto 2.5rem auto;
      background: #000;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.8rem 0;
    }

    /* ===== 宠物精灵 ===== */
    .pet-character {
      width: 280px; height: 280px;
      background: url('assets/peace_strip.png') 0 0 no-repeat;
      background-size: 18200px 280px;  /* 65帧 × 280px */
      image-rendering: auto;
      position: relative;
      z-index: 2;
      cursor: pointer;
      animation: pet-peace 6.5s steps(65) infinite;
    }
    @keyframes pet-peace {
      0%   { background-position: 0 0; }
      100% { background-position: -18200px 0; }
    }
    /* 宠物跳起动画（点击/回答触发） */
    .pet-character.jump {
      background-image: url('assets/jump_strip.png');
      background-size: 13440px 280px;  /* 48帧 × 280px */
      animation: pet-jump 4s steps(48) forwards;
    }
    @keyframes pet-jump {
      0%   { background-position: 0 0; }
      100% { background-position: -13440px 0; }
    }
    /* 宠物闪光 */
    .pet-character.flash {
      filter: brightness(1.5);
      transition: filter 0.1s;
    }

    .prompt-text {
      color: #d4c094;
      font-size: 1.2rem;
      letter-spacing: 0.25em;
      text-shadow: 0 0 15px #1a1608;
      margin-bottom: 2rem;
      font-weight: 350;
      text-align: center;
      line-height: 1.7;
      background: linear-gradient(180deg,#ebd79c 0%,#9b8a5a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      border-bottom: 1px dashed rgba(190,160,70,0.3);
      padding-bottom: 0.8rem;
      width: fit-content;
      margin-left: auto; margin-right: auto;
    }

    .answer-display {
      width: 100%; min-height: 130px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(200,170,70,0.35);
      border-radius: 2.5rem;
      margin: 0.6rem 0 2.2rem 0;
      padding: 1.8rem;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      color: #f7efcc;
      font-size: 1.8rem;
      font-weight: 420;
      letter-spacing: 0.12em;
      line-height: 1.5;
      text-shadow: 0 0 20px #9b8a4a;
      box-shadow: inset 0 0 35px rgba(20,15,0,0.9), 0 8px 20px rgba(0,0,0,0.8);
      transition: all 0.4s cubic-bezier(0.2,0.9,0.4,1);
      word-break: break-word;
      background-image: radial-gradient(circle at 20% 30%, rgba(70,60,20,0.3) 0%, transparent 50%);
      position: relative;
      overflow: hidden;
    }
    .answer-placeholder {
      color: #5a5440;
      font-size: 1.3rem;
      letter-spacing: 0.2em;
      opacity: 0.7;
      font-style: italic;
    }

    .duck-icon { font-size: 1.6rem; filter: drop-shadow(0 0 8px gold); }

    .version-tag {
      position: fixed;
      top: 12px; left: 16px;
      color: rgba(220,200,120,0.35);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      font-family: "Courier New",monospace;
      z-index: 1;
      user-select: none;
    }

    .footnote {
      margin-top: 1.8rem;
      color: #4a432a;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      opacity: 0.6;
    }
    .footnote a {
      color: #6a5e3a;
      text-decoration: none;
      transition: color 0.3s;
    }
    .footnote a:hover {
      color: #9b8a5a;
    }

    /* ===== 答案出场（慢速优雅渐入） ===== */
    @keyframes answer-appear {
      0%   { opacity: 0; transform: translateY(12px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .answer-appear {
      animation: answer-appear 1.5s ease-out forwards;
    }

    @media (max-width: 500px) {
      .book-container { padding: 1.5rem 0.8rem; border-radius: 2rem; }
      .pet-scene { margin-bottom: 1.5rem; overflow: hidden; }
      .answer-display { font-size: 1.2rem; min-height: 100px; padding: 1.2rem; }
      .prompt-text { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="version-tag">v 1.3.0</div>

  <!-- 加载弹窗 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-dialog">
      <div class="loading-duck">🦆</div>
      <div class="loading-title">加载中...</div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
    </div>
  </div>

  <div class="book-container">
    <!-- 展示区：精灵动画宠物 -->
    <div class="pet-scene" id="petScene">
      <div class="pet-character" id="petCharacter"></div>
    </div>

    <div class="prompt-text">
      <span class="duck-icon">🦆</span> 戳一戳鸭吉吉<br>
      <span style="font-size:0.9rem; display:block; margin-top:0.2rem;">它会给你答案</span>
    </div>

    <div class="answer-display" id="answerDisplay">
      <span class="answer-placeholder" id="answerText">静默思考中...</span>
    </div>

    <div class="footnote">◈ YajijiOracle · 鸭吉吉答案之书 ◈<br><span style="opacity:0.4">by <a href="https://github.com/TsangHaotian">TsangHaotian</a></span> <span class="sep">|</span> <a href="https://github.com/TsangHaotian/YajijiOracle">GitHub</a></div>
  </div>

  <script>
    (function() {
      const loadingOverlay = document.getElementById('loadingOverlay');
      const progressFill = document.getElementById('progressFill');
      const progressText = document.getElementById('progressText');

      // ========== 预加载 + 加载进度 ==========
      var pageShown = false;
      var progressVal = 0;

      function updateProgress(pct) {
        progressVal = pct;
        progressFill.style.width = pct + '%';
        progressText.textContent = pct + '%';
      }

      function showPage() {
        if (pageShown) return;
        pageShown = true;
        updateProgress(100);
        setTimeout(function() {
          loadingOverlay.classList.add('hidden');
        }, 300);
        window.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleGetAnswer(); }
        });
        console.log('🦆 YajijiOracle v1.3.0 已开启。');
      }

      // 预加载两张精灵图
      var loaded = 0;
      function onImgLoad() {
        loaded++;
        var pct = loaded === 1 ? 65 : 100;
        if (pct > progressVal) updateProgress(pct);
        if (loaded >= 2) showPage();
      }

      var peaceImg = new Image();
      peaceImg.onload = peaceImg.onerror = onImgLoad;
      peaceImg.src = 'assets/peace_strip.png';
      var jumpImg = new Image();
      jumpImg.onload = jumpImg.onerror = onImgLoad;
      jumpImg.src = 'assets/jump_strip.png';

      // 装饰模拟进度（快速走到60%，等真实加载完成）
      function simProgress(step) {
        if (pageShown) return;
        var vals = [5, 15, 28, 40, 50, 58, 62];
        if (step < vals.length) {
          if (vals[step] > progressVal) updateProgress(vals[step]);
          setTimeout(function() { simProgress(step + 1); }, 70 + Math.random() * 60);
        }
      }
      simProgress(0);

      // 保底：8秒强制显示
      setTimeout(function() { if (!pageShown) showPage(); }, 8000);

      // ========== 宠物交互 ==========
      const petCharacter = document.getElementById('petCharacter');
      var jumpTimer = null;

      function petBounce() {
        if (jumpTimer) clearTimeout(jumpTimer);

        // 如果已经在跳，重置动画
        if (petCharacter.classList.contains('jump')) {
          petCharacter.classList.remove('jump');
          void petCharacter.offsetWidth; // 触发回流，强制重启动画
        }

        petCharacter.classList.add('jump');

        // 闪光
        petCharacter.classList.add('flash');
        playChime();  // 点击音效
        setTimeout(function() { petCharacter.classList.remove('flash'); }, 200);

        // 跳完后（4s）恢复 peace 空闲动画
        jumpTimer = setTimeout(function() {
          petCharacter.classList.remove('jump');
          jumpTimer = null;
        }, 4000);
      }

      var clickCount = 0;
      var clickResetTimer = null;
      var tooFastMsg = '🦆 鸭吉吉快被你戳死了\n手速慢点吧...';

      function petClickHandler() {
        // 快速连点检测
        clickCount++;
        if (clickResetTimer) clearTimeout(clickResetTimer);
        clickResetTimer = setTimeout(function() { clickCount = 0; clickResetTimer = null; }, 2000);

        petBounce();

        if (clickCount >= 3 && isAnimating) {
          // 手速太快：弹出警告
          isAnimating = true;
          answerTextElement.classList.remove('answer-placeholder','answer-appear');
          answerTextElement.textContent = '🙏';
          // 用 setTimeout 分两段显示，模拟打字
          setTimeout(function() {
            answerTextElement.textContent = tooFastMsg;
            answerTextElement.classList.add('answer-appear');
            setTimeout(function() { isAnimating = false; }, 2000);
          }, 200);
          return;
        }

        handleGetAnswer();
      }

      petCharacter.addEventListener('click', petClickHandler);
      petCharacter.addEventListener('touchstart', function(e) {
        e.preventDefault();
        petClickHandler();
      }, { passive: false });

      // ========== 答案系统 ==========
      const answers = [
        "是的，毫无疑问。", "鸭吉吉说：时机未到。", "相信你的直觉。",
        "不要犹豫，去吧。", "答案就在你心中。", "再等一等，涟漪会平静。",
        "它已经在路上了。", "保持好奇心。", "换个角度看看。",
        "鸭吉吉点头：当然。", "别想太多，顺其自然。", "也许你应该放手。",
        "这将是一个惊喜。", "值得冒险一试。", "倾听内心的声音。",
        "很快就会有答案。", "鸭吉吉摇头：未必。", "你需要更多耐心。",
        "结果是积极的。", "暂时保持沉默。", "对，但方式可能不同。",
        "命运站在你这边。", "不要强求。", "享受过程吧。",
        "它会以奇妙的方式出现。", "鸭吉吉认为：可行。", "小心过于乐观。",
        "先完成手头的事。", "宇宙在为你布局。", "平凡中藏有答案。",
        "勇敢一点。", "等待更好的时机。", "答案是模糊的，再问一次。",
        "鸭吉吉微笑：如你所愿。", "改变正在发生。", "专注当下。",
        "别被表象迷惑。", "你早已知道答案。", "水到渠成。", "或许需要他人帮助。"
      ];

      const answerTextElement = document.getElementById('answerText');

      var chimeAudio = new Audio('audio/click.mp3');
      chimeAudio.preload = 'auto';

      var isAnimating = false;
      var animationTimer = null;

      function getRandomAnswer() {
        return answers[Math.floor(Math.random() * answers.length)];
      }

      function playChime() {
        try { chimeAudio.currentTime = 0; chimeAudio.play().catch(function(){}); } catch(e) {}
      }

      // 炫彩三角形粒子爆开
      function createTriangles() {
        var rect = answerTextElement.getBoundingClientRect();
        var cx = rect.left + rect.width/2;
        var cy = rect.top + rect.height/2;
        var colors = ['#ff0040','#ff8c00','#ffe600','#66ff00','#00ffcc','#0066ff','#6600ff','#ff00cc','#ff88aa','#00ff80','#ff6600','#aa44ff'];

        for (var i = 0; i < 35; i++) {
          var el = document.createElement('div');
          var size = 8 + Math.random() * 18;
          var color = colors[Math.floor(Math.random() * colors.length)];
          var angle = Math.random() * Math.PI * 2;
          var dist = 80 + Math.random() * 300;
          var dx = Math.cos(angle) * dist;
          var dy = Math.sin(angle) * dist - 60;

          el.style.cssText = [
            'position:fixed',
            'width:' + size + 'px',
            'height:' + size + 'px',
            'background:' + color,
            'clip-path:polygon(50% 0%,0% 100%,100% 100%)',
            'pointer-events:none',
            'z-index:1000',
            'left:' + (cx - size/2) + 'px',
            'top:' + (cy - size/2) + 'px',
            'opacity:1',
            'filter:drop-shadow(0 0 4px ' + color + ')'
          ].join(';');
          document.body.appendChild(el);

          el.animate([
            { transform: 'translate(0,0) rotate(0deg) scale(1)', opacity: 1 },
            { transform: 'translate('+dx+'px,'+dy+'px) rotate('+(Math.random()*1080-540)+'deg) scale(0.2)', opacity: 0 }
          ], {
            duration: 700 + Math.random() * 1100,
            easing: 'cubic-bezier(0.1,0.8,0.3,1)',
            fill: 'forwards',
            delay: Math.random() * 150
          }).onfinish = function() { el.remove(); };
        }
      }
      function setAnswerWithEffect(answer) {
        if (animationTimer) clearTimeout(animationTimer);
        answerTextElement.classList.remove('answer-placeholder');
        answerTextElement.textContent = answer;
        animationTimer = setTimeout(function() { animationTimer = null; }, 60);
      }

      function handleGetAnswer() {
        if (isAnimating) return;
        if (animationTimer) { clearTimeout(animationTimer); animationTimer = null; }
        isAnimating = true;
        var newAnswer = getRandomAnswer();

        answerTextElement.classList.remove('answer-placeholder','answer-appear');

        setAnswerWithEffect(newAnswer);

        answerTextElement.classList.add('answer-appear');

        createTriangles();
        playChime();

        setTimeout(function() { isAnimating = false; }, 1600);
      }
    })();
  </script>
</body>
</html>
